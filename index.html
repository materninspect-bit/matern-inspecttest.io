<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matern'inspect</title>
<link rel="icon" type="image/png" href="logo-materne.png">

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url('Pommes.jpg') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
}

/* Logo */
.logo {
  width: 150px;
  max-width: 40%;
  height: auto;
  position: absolute;
  right: 10px;
  top: 10px;
  z-index: 10;
}

/* Texte */
h1 { color: red; font-size: 30px; }
p  { color: green; font-size: 26px; }

a {
  display: inline-block;
  margin-top: 20px;
  font-size: 18px;
  color: blue;
  cursor: pointer;
  text-decoration: underline;
}

/* ─── Vues ─── */
#vue-principale,
#vue-iframe,
#vue-confirmation {
  display: none;
}
#vue-principale { display: block; }

/* ─── Vue iframe ─── */
#vue-iframe {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 100;
  flex-direction: column;
}
#vue-iframe.actif { display: flex; }

#barre-iframe {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #d32f2f;
  padding: 10px 16px;
  flex-shrink: 0;
}

#barre-iframe span {
  color: #fff;
  font-size: 16px;
  font-weight: bold;
}

#btn-fermer-iframe {
  background: rgba(255,255,255,0.25);
  border: none;
  color: #fff;
  font-size: 20px;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  cursor: pointer;
  line-height: 36px;
  text-align: center;
  flex-shrink: 0;
}

#le-iframe {
  flex: 1;
  border: none;
  width: 100%;
}

/* ─── Spinner pendant chargement ─── */
#spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  animation: tourner 1s linear infinite;
  z-index: 101;
}
@keyframes tourner {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ─── Vue confirmation ─── */
#vue-confirmation { padding-top: 80px; }

.bulle {
  display: inline-block;
  background: #ffffff;
  border: 3px solid #4caf50;
  border-radius: 20px;
  padding: 24px 36px;
  margin-top: 40px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.30);
  animation: apparition 0.4s ease;
}

.bulle .icone { font-size: 48px; display: block; margin-bottom: 10px; }

.bulle p {
  color: #2e7d32;
  font-size: 22px;
  font-weight: bold;
  margin: 0;
}

.btn-retour {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 40px;
  background: #d32f2f;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  padding: 14px 30px;
  border-radius: 50px;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.30);
  transition: background 0.2s, transform 0.15s;
}

.btn-retour:hover { background: #b71c1c; transform: translateY(-2px); }
.btn-retour .fleche { font-size: 22px; }

@keyframes apparition {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* 📱 Mobile */
@media (max-width: 600px) {
  h1 { font-size: 24px; }
  p  { font-size: 22px; }
  .logo { width: 100px; }
  .bulle p { font-size: 18px; }
}

</style>
</head>

<body>

<img src="logo-materne.png" class="logo" alt="Logo Materne">

<!-- ══════════════════════════════════════ -->
<!--  VUE PRINCIPALE : les 4 formulaires   -->
<!-- ══════════════════════════════════════ -->
<div id="vue-principale">

  <h1><br><br>Bonjour !</h1>
  <p><strong>Prêt pour votre session d'inspection ?</strong></p>

  <a onclick="ouvrirFormulaire('https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13', 'Ligne de conditionnement')">
    Formulaire ligne de conditionnement
  </a>
  <br><br>

  <a onclick="ouvrirFormulaire('https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13', 'Zone de pasteurisation')">
    Formulaire zone de pasteurisation
  </a>
  <br><br>

  <a onclick="ouvrirFormulaire('https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13', 'Entrepôt logistique B')">
    Formulaire entrepôt logistique B
  </a>
  <br><br>

  <a onclick="ouvrirFormulaire('https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13', 'Zone préparation')">
    Formulaire zone préparation
  </a>

</div>

<!-- ══════════════════════════════════════ -->
<!--  VUE IFRAME                           -->
<!-- ══════════════════════════════════════ -->
<div id="vue-iframe">
  <div id="barre-iframe">
    <button id="btn-fermer-iframe" onclick="fermerIframe()" title="Fermer">✕</button>
    <span id="titre-iframe">Formulaire</span>
  </div>
  <div id="spinner">⏳</div>
  <iframe id="le-iframe" src="" onload="iframeChargee()"></iframe>
</div>

<!-- ══════════════════════════════════════ -->
<!--  VUE CONFIRMATION                     -->
<!-- ══════════════════════════════════════ -->
<div id="vue-confirmation">

  <div class="bulle">
    <span class="icone">✅</span>
    <p>Votre questionnaire a bien été envoyé&nbsp;!</p>
  </div>

  <br>

  <button class="btn-retour" onclick="revenirAccueil()">
    <span class="fleche">←</span> Retour à l'accueil
  </button>

</div>

<!-- ══════════════════════════════════════ -->
<!--  SCRIPT                               -->
<!-- ══════════════════════════════════════ -->
<script>

  var urlFormulaire = '';
  var chargements = 0; // compte les fois où l'iframe se charge

  function ouvrirFormulaire(url, nom) {
    urlFormulaire = url;
    chargements = 0;

    document.getElementById('titre-iframe').textContent = nom;
    document.getElementById('spinner').style.display = 'block';

    // Charger l'iframe
    document.getElementById('le-iframe').src = url;

    // Afficher la vue iframe
    document.getElementById('vue-principale').style.display = 'none';
    document.getElementById('vue-iframe').classList.add('actif');
  }

  function iframeChargee() {
    chargements++;
    document.getElementById('spinner').style.display = 'none';

    // Le 1er chargement = affichage du formulaire
    // Le 2ème chargement = Grist a redirigé après soumission → confirmation !
    if (chargements >= 2) {
      afficherConfirmation();
    }
  }

  function fermerIframe() {
    // Fermeture manuelle (croix) sans avoir soumis
    document.getElementById('vue-iframe').classList.remove('actif');
    document.getElementById('le-iframe').src = '';
    document.getElementById('vue-principale').style.display = 'block';
    chargements = 0;
  }

  function afficherConfirmation() {
    document.getElementById('vue-iframe').classList.remove('actif');
    document.getElementById('le-iframe').src = '';
    chargements = 0;

    document.getElementById('vue-confirmation').style.display = 'block';
  }

  function revenirAccueil() {
    document.getElementById('vue-confirmation').style.display = 'none';
    document.getElementById('vue-principale').style.display  = 'block';
  }

</script>

</body>
</html>
