<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matern'inspect</title>
<link rel="icon" type="image/png" href="logo-materne.png">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url('Pommes.jpg') no-repeat center center fixed;
  background-size: cover;
  min-height: 100vh;
}

.logo {
  width: 150px;
  max-width: 40%;
  height: auto;
  position: absolute;
  right: 10px;
  top: 10px;
}

h1 { color: red; font-size: 30px; }
p  { color: green; font-size: 26px; }

a {
  display: inline-block;
  margin-top: 20px;
  font-size: 18px;
  color: blue;
}

#vue-principale   { display: block; }
#vue-confirmation { display: none; padding-top: 80px; }

.bulle {
  display: inline-block;
  background: #ffffff;
  border: 3px solid #4caf50;
  border-radius: 20px;
  padding: 24px 36px;
  margin-top: 40px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.30);
  animation: apparition 0.4s ease;
}

.bulle .icone { font-size: 48px; display: block; margin-bottom: 10px; }

.bulle .nom-formulaire {
  color: #1565c0;
  font-size: 18px;
  font-weight: bold;
  margin: 0 0 8px 0;
}

.bulle p {
  color: #2e7d32;
  font-size: 22px;
  font-weight: bold;
  margin: 0;
}

.btn-retour {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 40px;
  background: #d32f2f;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  padding: 14px 30px;
  border-radius: 50px;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 14px rgba(0,0,0,0.30);
  transition: background 0.2s, transform 0.15s;
}
.btn-retour:hover { background: #b71c1c; transform: translateY(-2px); }
.btn-retour .fleche { font-size: 22px; }

@keyframes apparition {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 600px) {
  h1 { font-size: 24px; }
  p  { font-size: 22px; }
  .logo { width: 100px; }
}

</style>
</head>
<body>

<img src="logo-materne.png" class="logo" alt="Logo Materne">

<!-- VUE PRINCIPALE -->
<div id="vue-principale">
  <h1><br><br>Bonjour !</h1>
  <p><strong>Prêt pour votre session d'inspection ?</strong></p>

  <a href="https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13">
    Formulaire ligne de conditionnement
  </a><br><br>

  <a href="https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13">
    Formulaire zone de pasteurisation
  </a><br><br>

  <a href="https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13">
    Formulaire entrepôt logistique B
  </a><br><br>

  <a href="https://matinspect.getgrist.com/forms/kRTtNJLsvsfrzNfxJUW9Ko/13">
    Formulaire zone préparation
  </a>
</div>

<!-- VUE CONFIRMATION -->
<div id="vue-confirmation">
  <div class="bulle">
    <span class="icone">✅</span>
    <p>Le formulaire d'inspection de la zone :</p>
     <p class="nom-formulaire" id="nom-formulaire"></p>
    <p>a bien été envoyé&nbsp;!</p>
  </div>
  <br>
  <button class="btn-retour" onclick="revenirAccueil()">
    <span class="fleche">←</span> Retour à l'accueil
  </button>
</div>

<script>

  var nomsFormulaires = {
    '1': 'Ligne de conditonnement',
    '2': 'Zone de pasteurisation',
    '3': 'Entrepôt logistique B',
    '4': 'Zone préparation'
  };

  var params = new URLSearchParams(window.location.search);
  var envoye = params.get('envoye');

  if (envoye && nomsFormulaires[envoye]) {
    history.replaceState({}, '', window.location.pathname);
    document.getElementById('nom-formulaire').textContent = nomsFormulaires[envoye];
    afficherConfirmation();
  }

  function afficherConfirmation() {
    document.getElementById('vue-principale').style.display = 'none';
    document.getElementById('vue-confirmation').style.display = 'block';
  }

  function revenirAccueil() {
    document.getElementById('vue-confirmation').style.display = 'none';
    document.getElementById('vue-principale').style.display = 'block';
  }

</script>

</body>
</html>





</html>
